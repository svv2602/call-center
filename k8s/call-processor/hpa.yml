apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: call-processor
  namespace: call-center
  labels:
    app.kubernetes.io/name: call-processor
    app.kubernetes.io/part-of: call-center
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: call-processor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Primary: scale on active concurrent calls per pod.
    # Requires Prometheus Adapter (custom.metrics.k8s.io API)
    # mapping callcenter_active_calls gauge from Prometheus.
    - type: Pods
      pods:
        metric:
          name: callcenter_active_calls
        target:
          type: AverageValue
          averageValue: "10"  # scale out when >10 concurrent calls per pod
    # Fallback: CPU and memory as safety nets
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
