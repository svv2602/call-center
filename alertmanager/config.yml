# Static fallback config — NOT used at runtime.
# The Docker entrypoint renders config.yml.tmpl → config.yml via envsubst.
# See config.yml.tmpl for the actual template with Telegram receiver.
#
# This file exists only so that `docker compose config` validates cleanly
# when the entrypoint has not run yet.

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "blackhole"

receivers:
  - name: "blackhole"
    webhook_configs:
      - url: "http://localhost:9099/dev-null"
        send_resolved: false
